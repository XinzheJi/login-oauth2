server:
  port: 8081

# 应用基础配置
app:
  base-url: http://localhost:8081

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/tk_data?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 600000 # 10分钟
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2
          max-wait: 5000

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: b-system-jwt-secret-key-for-authentication-and-authorization
  expiration: 86400  # 24小时，单位秒
  tokenHeader: Authorization
  tokenPrefix: Bearer


# 混合认证配置
hybrid-auth:
  sso:
    enabled: true
    client-id: b-system-client
    client-secret: b-system-secret
    authorization-uri: http://localhost:8080/oauth/authorize
    token-uri: http://localhost:8080/oauth/token
    user-info-uri: http://localhost:8080/oauth/user
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback
    default-tenant-id: 1
    auto-create-user: true
    # SSO用户默认角色ID列表 (逗号分隔)
    # 2=普通用户角色，可以根据需要修改为其他角色ID
    default-role-ids: "2"
  frontend:
    callback-url: http://localhost:8082/#/login
# 日志配置
logging:
  level:
    com.tk.login: debug
    org.springframework.security: debug
#    org.springframework: DEBUG
#    org。springframework.beans: DEBUG