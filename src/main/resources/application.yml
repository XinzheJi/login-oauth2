server:
  port: 8081

# 应用基础配置
app:
  base-url: http://localhost:8081

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/tk_data?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 600000 # 10分钟
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:0.6b
          temperature: 0.2
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2
          max-wait: 5000
#
## MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  # 生产环境请通过环境变量 JWT_SECRET 注入，避免在仓库中硬编码；修改该值会使历史JWT全部失效
  secret: ${JWT_SECRET:dev-only-please-rotate-this-jwt-secret-2026-01-08-change-me}
  expiration: 86400  # 24小时，单位秒
  tokenHeader: Authorization
  tokenPrefix: Bearer

ai:
  api-key:
    # 如需在无JWT场景（例如内部服务/大屏）调用 /api/ai/**，配置环境变量 AI_API_KEY 并在请求头携带该值
    value: ${AI_API_KEY:}
    header: X-AI-API-KEY


# 混合认证配置
hybrid-auth:
  sso:
    enabled: true
    client-id: b-system-client
    client-secret: b-system-secret
    authorization-uri: http://localhost:8080/oauth/authorize
    token-uri: http://localhost:8080/oauth/token
    user-info-uri: http://localhost:8080/oauth/user
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback
    default-tenant-id: 1
    auto-create-user: true
    # SSO用户默认角色ID列表 (逗号分隔)
    # 2=普通用户角色，可以根据需要修改为其他角色ID
    default-role-ids: "2"
  frontend:
    callback-url: http://localhost:8082/#/login
# 日志配置
logging:
  level:
    com.tk.login: debug
    org.springframework.security: info
    com.system.ai.predict.repository: debug
#    org.springframework: DEBUG
#    org.springframework.beans: DEBUG

# TDengine（TAOS）连接配置（按现网修改）
taos:
  baseUrl: http://172.30.154.81:6041
  database: tk
  username: root
  password: root
  timeoutMs: 5000
  healthStable: t_device_health
  useSubTables: true
  historyDefaultLength: 336

timemoe:
  baseUrl: http://localhost:8000
  healthPath: /api/v1/health
  agingPath: /api/v1/predict/aging
  faultPath: /api/v1/predict/fault
  batchPath: /api/v1/batch/predict
  connectTimeoutMs: 2000
  readTimeoutMs: 9000
  maxRetries: 0
  maxConcurrent: 12
  acquireTimeoutMs: 80
  apiKey: 
  apiKeyHeader: Authorization
  batchFallbackToSingle: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

# AI 预测本地缓存（Caffeine）
predict:
  async:
    timeoutMs: 30000
    corePoolSize: 8
    maxPoolSize: 16
    queueCapacity: 20
  cache:
    snapshot:
      ttlSeconds: 10
      maximumSize: 1000
    metadata:
      ttlSeconds: 600
      maximumSize: 10000
  scheduler:
    enabled: false
    # cron: "0 0/5 * * * ?"
    cron: "*/10 * * * * *"
    deviceIds: ["sw-0199", "sw-0207"]
    batchSize: 20
    historyLength: 336
    minimumHistorySize: 64
    mode: default
