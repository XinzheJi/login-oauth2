<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统A - 授权确认</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .app-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .app-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .permissions {
            margin-bottom: 20px;
        }
        .permission-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .permission-item:before {
            content: "✓";
            color: #28a745;
            font-weight: bold;
            margin-right: 8px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }
        .btn-approve {
            background: #28a745;
            color: white;
        }
        .btn-approve:hover {
            background: #218838;
            transform: translateY(-1px);
        }
        .btn-deny {
            background: #6c757d;
            color: white;
        }
        .btn-deny:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }
        .security-notice {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 6px;
            font-size: 12px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">🔐</div>
        <h1>授权确认</h1>
        <p class="subtitle">系统B 请求访问您的账户</p>
        
        <div class="app-info">
            <div class="app-name">系统B (System-B)</div>
            <div style="color: #666; font-size: 12px;">客户端ID: <span th:text="${clientId}">b-system-client</span></div>
        </div>
        
        <div class="permissions">
            <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">请求的权限:</h3>
            <div class="permission-item">读取您的基本信息</div>
            <div class="permission-item">访问您的邮箱地址</div>
            <div class="permission-item">验证您的身份</div>
        </div>
        
        <form method="post" action="/oauth/authorize">
            <input type="hidden" name="client_id" th:value="${clientId}" />
            <input type="hidden" name="redirect_uri" th:value="${redirectUri}" />
            <input type="hidden" name="scope" th:value="${scope}" />
            <input type="hidden" name="state" th:value="${state}" />
            <input type="hidden" name="response_type" th:value="${responseType}" />
            
            <div class="button-group">
                <button type="submit" name="approve" value="false" class="btn btn-deny">
                    拒绝
                </button>
                <button type="submit" name="approve" value="true" class="btn btn-approve">
                    授权
                </button>
            </div>
        </form>
        
        <div class="security-notice">
            🛡️ 您的账户安全由系统A保护。只有在您同意的情况下，系统B才能访问您的信息。
        </div>
    </div>
</body>
</html>
